version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: sobat-pintar-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
      POSTGRES_DB: ${DB_NAME:-sobat_pintar}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sobat-network

  redis:
    image: redis:7-alpine
    container_name: sobat-pintar-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sobat-network

  backend:
    build: ./backend
    container_name: sobat-pintar-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    networks:
      - sobat-network

  frontend:
    build: ./frontend
    container_name: sobat-pintar-frontend
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    depends_on:
      - backend
    networks:
      - sobat-network

networks:
  sobat-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
